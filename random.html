<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lovely Professional University</title>
  <style>
    /* ===== Reset ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #f4f6f8;
    }

    /* ===== Navigation Bar ===== */
    nav {
      background-color: #5de964; /* LPU dark red */
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 30px;
      color: #fff;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-size: 1.6rem;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 25px;
    }

    .nav-links a {
      text-decoration: none;
      color: #fff;
      font-weight: 500;
      transition: 0.3s ease;
      position: relative;
    }

    /* Hover Effect */
    .nav-links a:hover {
      color: #ffcc00;
    }

    /* Active Link */
    .nav-links a.active {
      color: #ffcc00;
      font-weight: bold;
    }

    /* Visited Link */
    .nav-links a:visited {
      color: #f0f0f0;
    }

    /* Underline Animation */
    .nav-links a::after {
      content: "";
      position: absolute;
      width: 0%;
      height: 2px;
      bottom: -4px;
      left: 0;
      background-color: #ffcc00;
      transition: width 0.3s ease;
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    /* ===== Hamburger Menu ===== */
    .hamburger {
      display: none;
      flex-direction: column;
      cursor: pointer;
    }

    .hamburger div {
      width: 25px;
      height: 3px;
      background-color: #fff;
      margin: 4px;
      transition: all 0.3s ease;
    }

    /* ===== Responsive Design ===== */
    @media (max-width: 768px) {
      .nav-links {
        display: none;
        flex-direction: column;
        background-color: #8b0000;
        position: absolute;
        top: 60px;
        left: 0;
        width: 100%;
        text-align: center;
        padding: 20px 0;
      }

      .nav-links.active {
        display: flex;
      }

      .hamburger {
        display: flex;
      }
    }
  </style>
</head>
<body>

    <div class="logo">Lovely Professional University</div>
    <ul class="nav-links">
      <li><a href="#" class="active">Home</a></li>

      <li><a href="#">Admissions</a></li>
      <li><a href="#">Research</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
    <div class="hamburger" id="hamburger">
      <div></div>
      <div></div>
      <div></div>
    </div>
  </nav>
